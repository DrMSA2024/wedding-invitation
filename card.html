<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0a10" />
  <title>Your Wedding Invitation — Anas &amp; Ruhi</title>
  <meta name="description" content="A personal wedding invitation from Mohd Anas Alam & Ruhi — November 2026" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Great+Vibes&family=Amiri:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════
       RESET & ROOT VARIABLES
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --rose:         #A35C4A;
      --rose-dark:    #7a3528;
      --rose-light:   #c4796a;
      --gold:         #D4AF7A;
      --gold-dark:    #b8924a;
      --gold-light:   #f0deb8;
      --gold-shimmer: #f5e6c0;
      --sage:         #8fa876;
      --sage-dark:    #5e7348;
      --ivory:        #FFFCF5;
      --cream:        #FDF5E8;
      --deep-bg:      #0d0508;
      --mid-bg:       #1a0a10;
      --charcoal:     #2D2A2A;
      --text-muted:   #6b5b4e;
      --border-gold:  rgba(212,175,122,0.45);
      --shadow-warm:  rgba(163,92,74,0.3);
    }

    /* Reduced-motion accessibility */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ═══════════════════════════════════════════════════
       BASE LAYOUT
    ═══════════════════════════════════════════════════ */
    html {
      height: 100%;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background: radial-gradient(ellipse at 15% 10%, #3b1f2b 0%, #1a0a10 45%, #0d0508 100%);
      font-family: 'Montserrat', sans-serif;
      color: var(--charcoal);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════════════
       AMBIENT BACKGROUND LAYERS
    ═══════════════════════════════════════════════════ */
    #bg-stars,
    #bg-petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* Star particles */
    .star {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      will-change: transform, opacity;
      animation: twinkle var(--dur, 3s) ease-in-out var(--delay, 0s) infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(0.8); }
      50%       { opacity: 1;    transform: scale(1.4); }
    }

    /* Floating petals */
    .petal {
      position: absolute;
      border-radius: 80% 0 80% 0;
      background: linear-gradient(135deg, rgba(212,175,122,0.4), rgba(163,92,74,0.25));
      will-change: transform, opacity;
      animation: petalRise var(--pdur, 14s) linear var(--pdelay, 0s) infinite;
    }
    @keyframes petalRise {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0;   }
      8%   { opacity: 0.6; }
      92%  { opacity: 0.4; }
      100% { transform: translateY(-15vh) rotate(420deg); opacity: 0;   }
    }

    /* ═══════════════════════════════════════════════════
       LOADING SCREEN
    ═══════════════════════════════════════════════════ */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--deep-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      transition: opacity 0.6s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-arabic {
      font-family: 'Amiri', serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      color: var(--gold);
      text-shadow: 0 0 30px rgba(212,175,122,0.5);
      animation: pulseOp 1.6s ease-in-out infinite;
    }
    .loading-dots {
      display: flex;
      gap: 0.5rem;
    }
    .loading-dots span {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--gold);
      animation: dotBounce 0.8s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s;  }
    @keyframes dotBounce {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-10px); }
    }
    @keyframes pulseOp {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 1;   }
    }

    /* ═══════════════════════════════════════════════════
       MAIN STAGE — ENVELOPE PHASE
    ═══════════════════════════════════════════════════ */
    #envelope-stage {
      position: relative;
      z-index: 10;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 24px) 24px env(safe-area-inset-bottom, 24px);
      gap: 1.5rem;
    }

    /* ── Envelope wrapper ── */
    .env-wrap {
      cursor: pointer;
      position: relative;
      animation: envFloat 3.5s ease-in-out infinite;
      /* GPU layer */
      will-change: transform;
    }
    @keyframes envFloat {
      0%, 100% { transform: translateY(0px) rotate(-1.2deg);  }
      50%       { transform: translateY(-18px) rotate(1.2deg); }
    }

    /* Envelope outer dimensions */
    .envelope {
      width: clamp(280px, 88vw, 440px);
      height: clamp(185px, 58vw, 295px);
      position: relative;
      filter: drop-shadow(0 24px 48px rgba(0,0,0,0.65)) drop-shadow(0 0 20px rgba(212,175,122,0.15));
    }

    /* ── Envelope body ── */
    .env-body {
      position: absolute;
      inset: 0;
      background: linear-gradient(150deg, #f7eac8 0%, #eedbb0 50%, #e5cc96 100%);
      border-radius: 8px;
      border: 2px solid var(--gold);
      overflow: hidden;
    }
    /* Inner border */
    .env-body::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid var(--border-gold);
      border-radius: 4px;
    }
    /* Diagonal liner */
    .env-body::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent 0, transparent 7px,
        rgba(163,92,74,0.055) 7px, rgba(163,92,74,0.055) 8px
      );
    }

    /* ── Envelope side triangles ── */
    .env-tri {
      position: absolute;
      bottom: 0;
      top: 28%;
      width: 50%;
      z-index: 3;
    }
    .env-tri-left {
      left: 0;
      background: linear-gradient(135deg, #e8cc8a, #dfc070);
      clip-path: polygon(0 0, 0 100%, 100% 100%);
      border-left: 2px solid var(--gold);
      border-bottom: 2px solid var(--gold);
    }
    .env-tri-right {
      right: 0;
      background: linear-gradient(225deg, #e8cc8a, #dfc070);
      clip-path: polygon(100% 0, 0 100%, 100% 100%);
      border-right: 2px solid var(--gold);
      border-bottom: 2px solid var(--gold);
    }

    /* ── Wax seal ── */
    .env-seal {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(58px, 15vw, 76px);
      height: clamp(58px, 15vw, 76px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--rose-light) 0%, var(--rose) 45%, var(--rose-dark) 100%);
      border: 3px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold-light);
      font-size: clamp(1.4rem, 4vw, 2rem);
      z-index: 5;
      box-shadow: 0 4px 18px var(--shadow-warm), inset 0 0 18px rgba(0,0,0,0.2);
      animation: sealPulse 2.2s ease-in-out infinite;
    }
    @keyframes sealPulse {
      0%, 100% { box-shadow: 0 4px 18px var(--shadow-warm), 0 0 0 0 rgba(212,175,122,0.35); }
      50%       { box-shadow: 0 4px 18px var(--shadow-warm), 0 0 0 16px rgba(212,175,122,0); }
    }

    /* ── Flap ── */
    .env-flap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56%;
      background: linear-gradient(165deg, #f2dc9c 0%, #e9ca86 55%, #dfc070 100%);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      border-radius: 8px 8px 0 0;
      border-top: 2px solid var(--gold);
      border-left: 2px solid var(--gold);
      border-right: 2px solid var(--gold);
      transform-origin: top center;
      transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 6;
      /* 3D perspective on parent */
    }
    .env-wrap.opening .env-flap {
      transform: perspective(900px) rotateX(-180deg);
    }

    /* ── Guest name on envelope ── */
    .env-name {
      position: absolute;
      bottom: 18px; left: 0; right: 0;
      text-align: center;
      z-index: 7;
      pointer-events: none;
      padding: 0 12px;
    }
    .env-name-to {
      font-size: clamp(0.55rem, 1.8vw, 0.68rem);
      letter-spacing: 3px;
      color: rgba(122,53,40,0.65);
      text-transform: uppercase;
    }
    .env-name-main {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.3rem, 4.5vw, 1.8rem);
      color: var(--rose-dark);
      line-height: 1.2;
      margin-top: 2px;
    }
    .env-name-sub {
      font-size: clamp(0.6rem, 1.8vw, 0.72rem);
      color: var(--rose);
      letter-spacing: 1.5px;
      margin-top: 1px;
      opacity: 0.85;
    }

    /* ── Tap hint ── */
    .tap-hint {
      color: rgba(240,222,184,0.7);
      font-size: clamp(0.68rem, 2.2vw, 0.82rem);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
      animation: blinkHint 1s ease-in-out infinite;
      user-select: none;
      -webkit-user-select: none;
    }
    @keyframes blinkHint {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 1;   }
    }

    /* ── Hover state ── */
    .env-wrap:hover .env-seal,
    .env-wrap:focus-visible .env-seal {
      transform: translate(-50%, -50%) scale(1.06);
    }
    .env-wrap:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 8px;
      border-radius: 12px;
    }

    /* ═══════════════════════════════════════════════════
       CARD REVEAL PHASE
       Critical fix: card must NEVER be clipped
    ═══════════════════════════════════════════════════ */

    /* Full-screen overlay after opening */
    #card-stage {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: radial-gradient(ellipse at 20% 10%, #2e1520 0%, #120609 60%, #0a0305 100%);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: env(safe-area-inset-top, 16px) 0 env(safe-area-inset-bottom, 24px);
    }
    #card-stage.visible {
      display: block;
      animation: stageIn 0.4s ease;
    }
    @keyframes stageIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Inner scroll container — centers card vertically when space allows */
    .card-scroll-inner {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 32px;
      gap: 1.2rem;
    }

    /* ── Confetti canvas ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    /* ═══════════════════════════════════════════════════
       PREMIUM INVITATION CARD
    ═══════════════════════════════════════════════════ */
    .inv-card {
      width: 100%;
      max-width: 540px;
      background: linear-gradient(158deg, #fffcf8 0%, #fef6ed 40%, #fdf0e5 70%, #fff8f5 100%);
      border-radius: 28px;
      border: 1px solid var(--border-gold);
      box-shadow:
        0 0 0 1px rgba(212,175,122,0.2),
        0 8px 32px rgba(0,0,0,0.35),
        0 32px 64px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.8);
      overflow: hidden;
      position: relative;
      animation: cardReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      animation-delay: 0.3s;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(40px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* Gold shimmer sweep */
    .inv-card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(105deg,
        transparent 0%,
        rgba(255,255,255,0.08) 45%,
        rgba(212,175,122,0.12) 50%,
        rgba(255,255,255,0.08) 55%,
        transparent 100%
      );
      z-index: 1;
      animation: shimmerSweep 5s ease-in-out 1.5s infinite;
    }
    @keyframes shimmerSweep {
      0%   { left: -100%; }
      40%  { left: 140%;  }
      100% { left: 140%;  }
    }

    /* Corner ornaments */
    .inv-card::after {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(212,175,122,0.25);
      border-radius: 20px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card Header ── */
    .card-header {
      position: relative;
      z-index: 2;
      background: linear-gradient(140deg, var(--rose) 0%, #8d3f2e 55%, var(--rose-dark) 100%);
      padding: clamp(1.2rem, 4vw, 1.8rem) clamp(1rem, 4vw, 1.8rem) clamp(1rem, 3vw, 1.4rem);
      text-align: center;
      overflow: hidden;
    }
    /* Header texture */
    .card-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent 0, transparent 10px,
        rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 11px
      );
    }
    /* Header gold border bottom */
    .card-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .card-bismillah {
      position: relative;
      font-family: 'Amiri', serif;
      font-size: clamp(1.3rem, 4.5vw, 1.9rem);
      color: var(--gold-shimmer);
      text-shadow: 0 2px 12px rgba(0,0,0,0.3), 0 0 24px rgba(212,175,122,0.4);
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }
    .card-couple {
      position: relative;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 7vw, 3rem);
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35), 0 0 30px rgba(212,175,122,0.3);
      line-height: 1.15;
    }
    .card-tagline {
      position: relative;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.58rem, 1.8vw, 0.72rem);
      letter-spacing: 3.5px;
      color: rgba(240,222,184,0.8);
      text-transform: uppercase;
      margin-top: 0.4rem;
    }
    /* Decorative divider in header */
    .header-ornament {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      justify-content: center;
      margin: 0.7rem 0 0.4rem;
    }
    .header-ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,122,0.6), transparent);
      max-width: 80px;
    }
    .header-ornament-gem {
      color: var(--gold);
      font-size: 0.75rem;
      text-shadow: 0 0 8px rgba(212,175,122,0.7);
    }

    /* ── Card Body ── */
    .card-body {
      position: relative;
      z-index: 2;
      padding: clamp(1rem, 3.5vw, 1.5rem) clamp(1rem, 4vw, 1.6rem);
    }

    /* ── Guest Greeting ── */
    .guest-greeting {
      text-align: center;
      padding: 0.9rem 1rem 1rem;
      margin-bottom: 1rem;
      background: linear-gradient(145deg, rgba(163,92,74,0.07), rgba(212,175,122,0.1));
      border-radius: 18px;
      border: 1px solid var(--border-gold);
      position: relative;
      overflow: hidden;
    }
    .guest-greeting::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0, transparent 18px,
        rgba(212,175,122,0.04) 18px, rgba(212,175,122,0.04) 19px
      );
    }
    .greeting-dear {
      position: relative;
      font-size: clamp(0.6rem, 1.8vw, 0.7rem);
      letter-spacing: 3px;
      color: var(--sage);
      text-transform: uppercase;
      font-weight: 600;
    }
    .greeting-name {
      position: relative;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.5rem, 5.5vw, 2.1rem);
      color: var(--rose);
      line-height: 1.2;
      margin: 0.2rem 0 0;
    }
    .greeting-suffix {
      position: relative;
      font-size: clamp(0.68rem, 2vw, 0.8rem);
      color: var(--sage-dark);
      font-weight: 500;
      letter-spacing: 1px;
      margin-top: 0.15rem;
    }

    /* ── Decorative Divider ── */
    .ornament-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin: 0.9rem 0;
    }
    .ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
    }
    .ornament-gem {
      color: var(--gold);
      font-size: 0.9rem;
      line-height: 1;
    }

    /* ── Event Block ── */
    .event-block {
      background: #fff;
      border-radius: 16px;
      padding: clamp(0.8rem, 2.8vw, 1.1rem) clamp(0.9rem, 3vw, 1.2rem);
      margin-bottom: 0.8rem;
      border-left: 4px solid var(--rose);
      box-shadow: 0 3px 14px rgba(163,92,74,0.09), 0 1px 4px rgba(0,0,0,0.05);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .event-block:hover {
      transform: translateX(3px);
      box-shadow: 0 5px 20px rgba(163,92,74,0.14);
    }
    .event-block.reception {
      border-left-color: var(--sage);
    }
    .event-type-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.9vw, 0.7rem);
      letter-spacing: 2.5px;
      font-weight: 700;
      color: var(--rose);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .event-block.reception .event-type-label { color: var(--sage-dark); }
    .event-row {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      margin: 0.28rem 0;
      font-size: clamp(0.72rem, 2.2vw, 0.82rem);
      color: var(--charcoal);
      line-height: 1.5;
    }
    .event-icon {
      flex-shrink: 0;
      width: 18px;
      text-align: center;
      margin-top: 1px;
      color: var(--rose);
      font-size: 0.85rem;
    }
    .event-block.reception .event-icon { color: var(--sage-dark); }
    .event-venue-name { font-weight: 600; }

    /* ── Map Button ── */
    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.7rem;
      padding: 7px 18px;
      border-radius: 40px;
      background: linear-gradient(135deg, var(--rose) 0%, var(--rose-dark) 100%);
      color: #fff;
      text-decoration: none;
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      font-weight: 600;
      letter-spacing: 0.5px;
      min-height: 44px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 3px 10px var(--shadow-warm);
    }
    .map-btn:hover, .map-btn:focus-visible {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 18px var(--shadow-warm);
      outline: none;
    }
    .event-block.reception .map-btn {
      background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
      box-shadow: 0 3px 10px rgba(94,115,72,0.3);
    }
    .event-block.reception .map-btn:hover {
      box-shadow: 0 6px 18px rgba(94,115,72,0.35);
    }

    /* ── QR Code Section ── */
    .qr-section {
      margin-top: 0.5rem;
    }
    .qr-section-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.58rem, 1.7vw, 0.67rem);
      letter-spacing: 2.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0.7rem;
    }
    .qr-grid {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .qr-item {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;

/* ═══════════════════════════════════════════════════════
   ENVELOPE OPEN — clean two-phase animation
═══════════════════════════════════════════════════════ */
let envelopeOpened = false;

function openEnvelope() {
  if (envelopeOpened) return;
  envelopeOpened = true;

  const wrap    = document.getElementById('env-wrap');
  const tapHint = document.getElementById('tap-hint');

  /* Stop float animation */
  wrap.style.animation = 'none';
  if (tapHint) tapHint.style.display = 'none';

  /* Phase 1 — flap opens (3D rotateX) */
  wrap.classList.add('opening');

  /* Phase 2 — show card stage */
  setTimeout(() => {
    const envStage  = document.getElementById('envelope-stage');
    const cardStage = document.getElementById('card-stage');
    envStage.style.display  = 'none';
    cardStage.classList.add('visible');
    startConfetti();
  }, 780);
}

/* ═══════════════════════════════════════════════════════
   CONFETTI — canvas-based, GPU friendly, 60fps
═══════════════════════════════════════════════════════ */
(function setupConfetti() {
  const canvas  = document.getElementById('confetti-canvas');
  const ctx     = canvas.getContext('2d');
  const COLORS  = ['#D4AF7A','#A35C4A','#9CAF88','#F7E9E5','#ffffff','#f0deb8','#e8a090'];
  let pieces    = [];
  let rafId     = null;
  let running   = false;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize, { passive: true });
  resize();

  function randomPiece() {
    return {
      x:     Math.random() * canvas.width,
      y:     -12,
      r:     Math.random() * 7 + 4,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx:    (Math.random() - 0.5) * 3,
      vy:    Math.random() * 3.5 + 1.5,
      angle: Math.random() * Math.PI * 2,
      spin:  (Math.random() - 0.5) * 0.18,
      alpha: 1,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    };
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces = pieces.filter(p => p.alpha > 0.02 && p.y < canvas.height + 20);
    pieces.forEach(p => {
      p.x     += p.vx;
      p.y     += p.vy;
      p.angle += p.spin;
      p.vy    += 0.06; /* gravity */
      if (p.y > canvas.height * 0.6) p.alpha -= 0.012;

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.r, -p.r * 0.55, p.r * 2, p.r * 1.1);
      }
      ctx.restore();
    });
    if (running || pieces.length) rafId = requestAnimationFrame(draw);
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); rafId = null; }
  }

  /* Burst 120 pieces over 2s */
  window.startConfetti = function() {
    running = true;
    for (let i = 0; i < 120; i++) {
      setTimeout(() => pieces.push(randomPiece()), i * 16);
    }
    setTimeout(() => { running = false; }, 2000);
    if (!rafId) draw();
  };
})();

/* ═══════════════════════════════════════════════════════
   SHARE FUNCTIONS
═══════════════════════════════════════════════════════ */
function shareWA() {
  const sfx   = guestSuffix ? ' & ' + guestSuffix : '';
  const lines = [
    'Assalamu Alaikum Wa Rahmatullahi Wa Barakatuh',
    '',
    'Dear *' + guest.name + sfx + '*,',
    '',
    'Please open your personal wedding invitation:',
    window.location.href,
    '',
    '*JazakAllah Khair*',
    'Mohd Anas Alam & Ruhi'
  ];
  window.open('https://wa.me/?text=' + encodeURIComponent(lines.join('\n')), '_blank');
}

function copyLink() {
  const url = window.location.href;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url)
      .then(() => showToast('Link copied!'))
      .catch(() => fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
}
function fallbackCopy(url) {
  const t = document.createElement('textarea');
  t.value = url;
  t.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(t);
  t.focus(); t.select();
  try { document.execCommand('copy'); showToast('Link copied!'); } catch(e) {}
  document.body.removeChild(t);
}

function downloadCard() {
  const card = document.getElementById('inv-card');
  if (!card) return;
  /* Embed fonts link + minimal styles for standalone file */
  const standalone = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Invitation — ${escH(guest.name)}</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Amiri:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#fdf5e8;display:flex;justify-content:center;padding:2rem 1rem;font-family:'Montserrat',sans-serif}
    ${[...document.querySelectorAll('style')].map(s=>s.textContent).join('\n')}
  </style>
</head>
<body>
  <div class="inv-card" style="max-width:540px;width:100%">
    ${card.innerHTML}
  </div>
</body>
</html>`;
  const blob = new Blob([standalone], { type: 'text/html; charset=utf-8' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'Invitation_' + guest.name.replace(/\s+/g, '_') + '.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

/* Toast notification */
let toastTimeout;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.setAttribute('role', 'alert');
    t.setAttribute('aria-live', 'polite');
    t.style.cssText = [
      'position:fixed','bottom:80px','left:50%','transform:translateX(-50%)',
      'background:#2D2A2A','color:#fff','padding:10px 22px','border-radius:40px',
      'font-size:.78rem','font-family:Montserrat,sans-serif','font-weight:600',
      'letter-spacing:.5px','z-index:9999','opacity:0',
      'transition:opacity .3s ease','white-space:nowrap',
      'box-shadow:0 4px 18px rgba(0,0,0,.45)'
    ].join(';');
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => { t.style.opacity = '0'; }, 2200);
}

/* ═══════════════════════════════════════════════════════
   AMBIENT BACKGROUND — stars + petals
═══════════════════════════════════════════════════════ */
(function buildBackground() {
  /* Stars — create once, no continuous DOM mutation */
  const starsEl = document.getElementById('bg-stars');
  const frag    = document.createDocumentFragment();
  for (let i = 0; i < 130; i++) {
    const s  = document.createElement('div');
    const sz = Math.random() * 2.4 + 0.4;
    s.className = 'star';
    s.style.cssText = [
      'width:'  + sz + 'px',
      'height:' + sz + 'px',
      'top:'    + (Math.random() * 100) + '%',
      'left:'   + (Math.random() * 100) + '%',
      '--dur:'   + (Math.random() * 3 + 2) + 's',
      '--delay:' + (Math.random() * 5) + 's'
    ].join(';');
    frag.appendChild(s);
  }
  starsEl.appendChild(frag);

  /* Petals — pooled approach, spawn periodically */
  const petalsEl = document.getElementById('bg-petals');
  function spawnPetal() {
    const p  = document.createElement('div');
    const sz = Math.random() * 15 + 8;
    p.className = 'petal';
    p.style.cssText = [
      'width:'    + sz + 'px',
      'height:'   + sz + 'px',
      'left:'     + (Math.random() * 100) + '%',
      '--pdur:'   + (Math.random() * 8 + 10) + 's',
      '--pdelay:' + (Math.random() * 3) + 's'
    ].join(';');
    petalsEl.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.parentNode.removeChild(p); }, 16000);
  }
  /* Initial batch */
  for (let i = 0; i < 16; i++) setTimeout(spawnPetal, i * 220);
  /* Ongoing */
  setInterval(spawnPetal, 700);
})();

/* ═══════════════════════════════════════════════════════
   LOADING SCREEN DISMISS
═══════════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  setTimeout(() => {
    const ls = document.getElementById('loading-screen');
    if (ls) {
      ls.classList.add('hidden');
      setTimeout(() => ls && ls.parentNode && ls.parentNode.removeChild(ls), 700);
    }
  }, 500);
});
</script>
</body>
</html>
